server:
  port: 8080

spring:
  application:
    name: dhg-api

  profiles:
    include: [persistence, infra]
    active: ${SPRING_PROFILES_ACTIVE:dev}
    group:
      dev: persistence-dev
      prod: persistence-prod
      local: persistence-local
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# swagger
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true
    persist-authorization: true