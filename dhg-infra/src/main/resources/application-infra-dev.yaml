spring:
  data:
    redis:
      host: ${REDIS_HOST_DEV}
      port: ${REDIS_PORT}
      lettuce:
        pool:
          max-active: 150   # 동시에 유지할 최대 커넥션 수
          max-idle: 50      # 대기 상태의 최대 커넥션 수
          min-idle: 10      # 최소 대기 커넥션 수
          max-wait: 1000ms  # 커넥션을 확보하지 못했을 때 대기할 시간 (1초)